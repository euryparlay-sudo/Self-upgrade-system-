<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Upgrade System</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div id="notification-area" aria-live="polite" aria-atomic="true"></div>

<div class="app-wrapper">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <span class="topbar__brand">⚡ Self Upgrade System</span>
    <div class="topbar__actions">
      <div class="name-edit">
        <label for="player-name-input" class="sr-only">Your name</label>
        <input id="player-name-input" type="text" maxlength="24" placeholder="Your name…" />
        <button id="btn-save-name" class="btn btn--ghost">Save</button>
      </div>
      <button id="btn-reset" class="btn btn--danger">Reset</button>
    </div>
  </header>

  <main class="dashboard-grid">

    <!-- ── Player hero card ── -->
    <section class="card player-card" aria-label="Player overview">
      <div class="player-card__meta">
        <h1 id="player-name">Hero</h1>
        <span id="player-level">Level 1</span>
      </div>

      <div class="exp-bar-container" aria-label="Experience bar">
        <div class="exp-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="exp-bar-fill" id="exp-bar-fill"></div>
        </div>
        <span id="exp-label">0 / 100 EXP</span>
      </div>

      <div class="streak-row">
        <span id="streak-value">🔥 0-day streak</span>
        <span id="streak-best">Best: 0</span>
      </div>
    </section>

    <!-- ── Stats card ── -->
    <section class="card" aria-label="Player stats">
      <h2 class="card__title"><span class="card__title-icon">📊</span> Stats</h2>

      <div class="stat-row">

        <div class="stat-item">
          <div class="stat-label-row">
            <span class="stat-name">💪 Physical</span>
            <span class="stat-value" id="stat-physical-value">0</span>
          </div>
          <div class="stat-track">
            <div class="stat-bar stat-bar--physical" id="stat-physical-bar"></div>
          </div>
        </div>

        <div class="stat-item">
          <div class="stat-label-row">
            <span class="stat-name">🧠 Mind</span>
            <span class="stat-value" id="stat-mind-value">0</span>
          </div>
          <div class="stat-track">
            <div class="stat-bar stat-bar--mind" id="stat-mind-bar"></div>
          </div>
        </div>

        <div class="stat-item">
          <div class="stat-label-row">
            <span class="stat-name">🎯 Focus</span>
            <span class="stat-value" id="stat-focus-value">0</span>
          </div>
          <div class="stat-track">
            <div class="stat-bar stat-bar--focus" id="stat-focus-bar"></div>
          </div>
        </div>

      </div>
    </section>

    <!-- ── Quests card ── -->
    <section class="card quest-section" aria-label="Quests">
      <h2 class="card__title">
        <span class="card__title-icon">📋</span> Quests
        <span class="quest-counter" id="quest-counter">0 / 5 quests</span>
      </h2>

      <div id="quest-list" role="list" aria-label="Quest list">
        <!-- Populated by QuestUI.js -->
      </div>

      <!-- Add quest form -->
      <form id="add-quest-form" class="add-quest-form" novalidate>
        <h3>+ Add New Quest</h3>

        <div class="form-group">
          <label for="quest-title">Title <span aria-hidden="true">*</span></label>
          <input id="quest-title" type="text" maxlength="80" placeholder="e.g. Morning Workout" required />
        </div>

        <div class="form-group">
          <label for="quest-description">Description</label>
          <textarea id="quest-description" rows="2" maxlength="200" placeholder="Optional details…"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="quest-type">Type</label>
            <select id="quest-type">
              <option value="normal">🟢 Normal</option>
              <option value="hard">🔵 Hard</option>
              <option value="legend">🟣 Legend</option>
              <option value="custom">🎯 Custom</option>
            </select>
          </div>

          <div class="form-group">
            <label for="quest-category">Category</label>
            <select id="quest-category">
              <option value="physical">💪 Physical</option>
              <option value="mind">🧠 Mind</option>
              <option value="focus">🎯 Focus</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn btn--primary">Add Quest</button>
      </form>
    </section>

    <!-- ── Achievements card ── -->
    <section class="card achievement-section" aria-label="Achievements">
      <h2 class="card__title"><span class="card__title-icon">🏆</span> Achievements</h2>
      <div id="achievement-list" role="list" aria-label="Achievement list">
        <!-- Populated by AchievementUI.js -->
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>Self Upgrade System &mdash; All data stored locally in your browser.</p>
  </footer>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
