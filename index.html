<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Self Upgrade System</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div id="notification-area" aria-live="polite" aria-atomic="true"></div>

<div class="app-wrapper">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <span class="topbar__brand">⚡ Self Upgrade System</span>
    <div class="topbar__actions">
      <div class="name-edit">
        <label for="player-name-input" class="sr-only">Your name</label>
        <input id="player-name-input" type="text" maxlength="24" placeholder="Your name…" />
        <button id="btn-save-name" class="btn btn--ghost">Save</button>
      </div>
      <button id="btn-reset" class="btn btn--danger">Reset</button>
    </div>
  </header>

  <main class="dashboard-grid">

    <!-- ── Player info card ── -->
    <section class="card player-card" aria-label="Player overview">
      <div class="player-card__meta">
        <h1 id="player-name">Hero</h1>
        <span id="player-level">Level 1</span>
      </div>

      <div class="exp-bar-container" aria-label="Experience bar">
        <div class="exp-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div class="exp-bar-fill" id="exp-bar-fill"></div>
        </div>
        <span id="exp-label">0 / 100 EXP</span>
      </div>
    </section>

    <!-- ── Streak card ── -->
    <section class="card streak-card" aria-label="Streak">
      <h2 class="card__title"><span class="card__title-icon">🔥</span> Streak</h2>
      <div class="streak-info">
        <span id="streak-value" class="streak-current">0-day streak</span>
        <span id="streak-last-login" class="streak-date">Last login: —</span>
      </div>
    </section>

    <!-- ── Quests card ── -->
    <section class="card quest-section" aria-label="Today's Quests">
      <h2 class="card__title">
        <span class="card__title-icon">📋</span> Today's Quests
      </h2>

      <div id="quest-list" role="list" aria-label="Quest list">
        <!-- Populated by QuestUI.js -->
      </div>
    </section>

  </main>

  <footer class="app-footer">
    <p>Self Upgrade System &mdash; All data stored locally in your browser.</p>
  </footer>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
